<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Online Voting System</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 500px; margin: 40px auto;">
            <h2>Voter Profile</h2>
            <p>Here are your voter registration details and status.</p>

            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--card-border); border-radius: 12px; padding: 25px; text-align: left; margin-bottom: 30px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 10px;">
                    <span style="color: var(--text-secondary);">Full Name</span>
                    <span id="fullname-display" style="font-weight: 600;"></span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 10px;">
                    <span style="color: var(--text-secondary);">Username</span>
                    <span id="username-display" style="font-weight: 600; color: var(--accent-color);"></span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 5px;">
                    <span style="color: var(--text-secondary);">Status</span>
                    <span id="status-badge" style="font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 6px;"></span>
                </div>
            </div>

            <div id="voted-language-section" style="display: none; padding: 18px; border-radius: 10px; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.1); color: var(--success); font-weight: 500; font-size: 15px; margin-bottom: 25px;">
                You have voted for: <span id="voted-language" style="font-weight: 700;"></span>
            </div>

            <div id="no-vote-section" style="display: none; padding: 18px; border-radius: 10px; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.1); color: var(--error); font-weight: 500; font-size: 15px; margin-bottom: 25px;">
                You have not voted yet. <a href="voter.html" style="color: var(--primary-color); text-decoration: underline; font-weight: 600;">Submit your vote here!</a>
            </div>
        </div>
    </div>

    <script>
        const username = requireAuth();

        document.addEventListener("DOMContentLoaded", () => {
            const user = JSON.parse(localStorage.getItem("voter_" + username));

            document.getElementById("fullname-display").textContent = `${user.firstname} ${user.lastname}`;
            document.getElementById("username-display").textContent = user.username;

            const badge = document.getElementById("status-badge");
            if (user.status === "VOTED") {
                badge.textContent = "VOTED";
                badge.style.background = "rgba(16, 185, 129, 0.1)";
                badge.style.color = "var(--success)";
                badge.style.border = "1px solid rgba(16, 185, 129, 0.2)";

                document.getElementById("voted-language").textContent = user.voted;
                document.getElementById("voted-language-section").style.display = "block";
            } else {
                badge.textContent = "PENDING";
                badge.style.background = "rgba(239, 68, 68, 0.1)";
                badge.style.color = "var(--error)";
                badge.style.border = "1px solid rgba(239, 68, 68, 0.2)";

                document.getElementById("no-vote-section").style.display = "block";
            }
        });
    </script>
</body>
</html>
