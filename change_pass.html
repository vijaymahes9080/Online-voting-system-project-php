<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Online Voting System</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 450px; margin: 40px auto;">
            <h2>Change Password</h2>
            <p>Update your account security credentials.</p>

            <div id="error-alert" class="alert alert-error"></div>
            <div id="success-alert" class="alert alert-success"></div>

            <form id="change-pass-form">
                <div class="form-group">
                    <label for="cpassword">Current Password</label>
                    <input type="password" id="cpassword" required placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label for="npassword">New Password (min 6 chars)</label>
                    <input type="password" id="npassword" required minlength="6" placeholder="Enter new password">
                </div>
                <div class="form-group">
                    <label for="cnpassword">Confirm New Password</label>
                    <input type="password" id="cnpassword" required placeholder="Confirm new password">
                </div>
                <button type="submit" class="btn">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const username = requireAuth();

        document.getElementById("change-pass-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const cpassword = document.getElementById("cpassword").value;
            const npassword = document.getElementById("npassword").value;
            const cnpassword = document.getElementById("cnpassword").value;
            const errorAlert = document.getElementById("error-alert");
            const successAlert = document.getElementById("success-alert");

            errorAlert.style.display = "none";
            successAlert.style.display = "none";

            const user = JSON.parse(localStorage.getItem("voter_" + username));

            // Verify current password
            if (user.password !== cpassword) {
                errorAlert.textContent = "Current password is incorrect!";
                errorAlert.style.display = "block";
                return;
            }

            // Verify matches
            if (npassword !== cnpassword) {
                errorAlert.textContent = "New password and confirmation do not match!";
                errorAlert.style.display = "block";
                return;
            }

            // Update password
            user.password = npassword;
            localStorage.setItem("voter_" + username, JSON.stringify(user));

            successAlert.textContent = "Password updated successfully!";
            successAlert.style.display = "block";

            // Reset form
            document.getElementById("change-pass-form").reset();
        });
    </script>
</body>
</html>
